model_parameters:
  onnx_model: '/home/demo/tianbot_ws/best.onnx'
  march: 'bayes-e'
  output_model_file_prefix: 'vehicle_yolov8n_x5_640_nv12'
  working_dir: './x5_quant_output'
  layer_out_dump: False

input_parameters:
  input_name: 'images'
  input_type_train: 'rgb'
  input_layout_train: 'NCHW'
  input_shape: '1x3x640x640'
  input_batch: 1
  # The runtime will feed NV12. Keep the model-side normalization here so the
  # board input path matches the original ONNX preprocessing contract.
  norm_type: 'data_scale'
  scale_value: '0.003921568627451'
  input_type_rt: 'nv12'
  input_space_and_range: 'regular'

calibration_parameters:
  # Generate RGB uint8 NCHW bins from the original dataset images and point
  # cal_data_dir at that folder.
  cal_data_dir: '/home/demo/tianbot_ws/calibration_rgb_uint8_nchw'
  cal_data_type: 'uint8'
  preprocess_on: False
  calibration_type: 'default'
  per_channel: False

compiler_parameters:
  compile_mode: 'latency'
  debug: True
  core_num: 1
  optimize_level: 'O3'
  jobs: 8
  input_source: {'images': 'pyramid'}
